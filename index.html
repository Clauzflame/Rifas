<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD5iRdci7gDxTZcEizPJ5OfzxgcaaVWINc",
  authDomain: "rifa-clau.firebaseapp.com",
  projectId: "rifa-clau",
  storageBucket: "rifa-clau.firebasestorage.app",
  messagingSenderId: "852551386158",
  appId: "1:852551386158:web:75ae6222eb9921c3c10bbf"
};

// 🔥 INICIAR FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const grid = document.getElementById("grid");
const contador = document.getElementById("contador");

const total = 100;
const telefono = "18494501097";

let modoAdmin = false;

// 🔐 ADMIN
function loginAdmin() {
  const pass = prompt("Contraseña:");
  if (pass === "1097") {
    modoAdmin = true;
    alert("Admin activado");
  } else {
    alert("Incorrecto");
  }
}

// 🔥 TIEMPO REAL
db.collection("rifa").doc("numeros")
.onSnapshot((doc) => {

  let ocupados = [];

  if (doc.exists) {
    ocupados = doc.data().lista || [];
  }

  grid.innerHTML = "";

  contador.textContent = `Disponibles: ${total - ocupados.length} / ${total}`;

  for (let i = 1; i <= total; i++) {

    const div = document.createElement("div");
    div.classList.add("numero");
    div.textContent = i;

    if (ocupados.includes(i)) {
      div.classList.add("ocupado");
    }

    div.onclick = () => {

      if (modoAdmin) {
        if (!ocupados.includes(i)) {
          ocupados.push(i);

          db.collection("rifa").doc("numeros").set({
            lista: ocupados
          });
        }
      } else {
        const mensaje = `Hola, quiero el número ${i}`;
        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);
      }

    };

    grid.appendChild(div);
  }

});

</script>

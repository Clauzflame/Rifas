<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const grid = document.getElementById("grid");

const total = 100;
const telefono = "18494501097";

let ocupados = [];
let modoAdmin = false;

// 🔐 ADMIN
window.loginAdmin = function() {
  const pass = prompt("Contraseña:");
  if (pass === "1097") {
    modoAdmin = true;
    alert("Admin activado");
  }
};

// 🔥 1. GENERAR NÚMEROS SIEMPRE (NO DEPENDE DE FIREBASE)
function renderNumeros() {
  grid.innerHTML = "";

  for (let i = 1; i <= total; i++) {

    const div = document.createElement("div");
    div.className = "numero";
    div.textContent = i;

    if (ocupados.includes(i)) {
      div.classList.add("ocupado");
    }

    div.onclick = () => {

      if (modoAdmin) {

        if (ocupados.includes(i)) {
          ocupados = ocupados.filter(n => n !== i);
        } else {
          ocupados.push(i);
        }

        guardarFirebase();

        renderNumeros();

      } else {
        const mensaje = `Hola, quiero el número ${i}`;
        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);
      }

    };

    grid.appendChild(div);
  }
}

// 🔥 2. CONECTAR FIREBASE SIN ROMPER
function iniciarFirebase() {
  try {

    const firebaseConfig = {
      apiKey: "AIzaSyD5iRdci7gDxTZcEizPJ5OfzxgcaaVWINc",
      authDomain: "rifa-clau.firebaseapp.com",
      projectId: "rifa-clau"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("rifa").doc("numeros")
    .onSnapshot((doc) => {
      if (doc.exists) {
        ocupados = doc.data().lista || [];
        renderNumeros();
      }
    });

    window.guardarFirebase = function() {
      db.collection("rifa").doc("numeros").set({
        lista: ocupados
      });
    };

  } catch (error) {
    console.log("Firebase error:", error);
  }
}

// 🔥 INICIAR TODO
renderNumeros();      // 👈 SIEMPRE muestra números
iniciarFirebase();    // 👈 intenta conectar

</script>

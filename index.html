<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa Clau</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  max-width: 400px;
  margin: 20px auto;
}

.numero {
  padding: 15px;
  background: #222;
  cursor: pointer;
}

.ocupado {
  background: red;
}
</style>
</head>

<body>

<h1>Rifa</h1>

<button onclick="loginAdmin()">Admin</button>

<div id="grid" class="grid"></div>

<script>

const grid = document.getElementById("grid");

let ocupados = [];
let modoAdmin = false;

function loginAdmin() {
  const pass = prompt("Clave:");
  if (pass === "1097") modoAdmin = true;
}

function render() {
  grid.innerHTML = "";

  for (let i = 1; i <= 100; i++) {
    const div = document.createElement("div");
    div.className = "numero";
    div.textContent = i;

    if (ocupados.includes(i)) {
      div.classList.add("ocupado");
    }

    div.onclick = () => {
      if (modoAdmin) {
        if (ocupados.includes(i)) {
          ocupados = ocupados.filter(n => n !== i);
        } else {
          ocupados.push(i);
        }
        render();
      }
    };

    grid.appendChild(div);
  }
}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifas Clau</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial;
}

h1 {
  text-align: center;
  padding: 20px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 10px;
}

.title {
  font-size: 18px;
  margin-bottom: 5px;
}

.desc {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 10px;
}

/* PROGRESS */
.progress {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress-bar {
  height: 10px;
  background: gold;
}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  padding: 10px;
  background: gold;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎟️ Rifas Disponibles</h1>

<div class="container">

  <!-- RIFA 1 -->
  <div class="card">
    <img src="Portada.jpg">

    <div class="card-content">
      <div class="title">iPhone 12</div>
      <div class="desc">Participa y gana este iPhone 12 🔥</div>

      <div class="progress">
        <div class="progress-bar" style="width: 40%;"></div>
      </div>

      <small>40 / 100 vendidos</small>

      <a href="rifa.html" class="btn">Ver Rifa</a>
    </div>
  </div>

</div>

</body>
</html>

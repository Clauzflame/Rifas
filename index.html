<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iRdci7gDxTZcEizPJ5OfzxgcaaVWINc",
  authDomain: "rifa-clau.firebaseapp.com",
  projectId: "rifa-clau",
  storageBucket: "rifa-clau.firebasestorage.app",
  messagingSenderId: "852551386158",
  appId: "1:852551386158:web:75ae6222eb9921c3c10bbf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");
const contador = document.getElementById("contador");

const total = 100;
const telefono = "18494501097";

let modoAdmin = false;

// 🔐 ADMIN
function loginAdmin() {
  const pass = prompt("Contraseña:");
  if (pass === "1097") {
    modoAdmin = true;
    alert("Admin activado");
  } else {
    alert("Incorrecto");
  }
}

window.loginAdmin = loginAdmin;

// 🔥 TIEMPO REAL
onSnapshot(doc(db, "rifa", "numeros"), (docSnap) => {

  let ocupados = [];

  if (docSnap.exists()) {
    ocupados = docSnap.data().lista || [];
  }

  grid.innerHTML = "";

  contador.textContent = `Disponibles: ${total - ocupados.length} / ${total}`;

  for (let i = 1; i <= total; i++) {

    const div = document.createElement("div");
    div.classList.add("numero");
    div.textContent = i;

    if (ocupados.includes(i)) {
      div.classList.add("ocupado");
    }

    div.onclick = async () => {

      if (modoAdmin) {
        if (!ocupados.includes(i)) {
          ocupados.push(i);

          await setDoc(doc(db, "rifa", "numeros"), {
            lista: ocupados
          });
        }
      } else {
        const mensaje = `Hola, quiero el número ${i}`;
        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);
      }

    };

    grid.appendChild(div);
  }

});

</script>

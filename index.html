<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa Clau</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  max-width: 400px;
  margin: 20px auto;
}

.numero {
  padding: 15px;
  background: #222;
  cursor: pointer;
  transition: 0.2s;
}

.numero:hover {
  transform: scale(1.05);
}

.ocupado {
  background: red;
}

.botones {
  margin-top: 30px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎟️ Rifa</h1>

<div id="grid" class="grid"></div>

<!-- 🔘 BOTONES ABAJO -->
<div class="botones">
  <button id="adminBtn" onclick="loginAdmin()">Admin</button>
  <button id="salirBtn" onclick="salirAdmin()" style="display:none;">
    Salir
  </button>
</div>

<script>

const grid = document.getElementById("grid");

let ocupados = [];
let modoAdmin = false;

// 🔐 ENTRAR ADMIN
function loginAdmin() {
  const pass = prompt("Clave:");
  if (pass === "1097") {
    modoAdmin = true;
    alert("Modo admin activado 🔓");

    document.getElementById("adminBtn").style.display = "none";
    document.getElementById("salirBtn").style.display = "inline";
  } else {
    alert("Clave incorrecta ❌");
  }
}

// 🚪 SALIR ADMIN
function salirAdmin() {
  modoAdmin = false;
  alert("Saliste del modo admin 🔒");

  document.getElementById("adminBtn").style.display = "inline";
  document.getElementById("salirBtn").style.display = "none";
}

// 🔢 RENDER
function render() {
  grid.innerHTML = "";

  for (let i = 1; i <= 100; i++) {
    const div = document.createElement("div");
    div.className = "numero";
    div.textContent = i;

    if (ocupados.includes(i)) {
      div.classList.add("ocupado");
    }

    div.onclick = () => {
      if (modoAdmin) {
        if (ocupados.includes(i)) {
          ocupados = ocupados.filter(n => n !== i);
        } else {
          ocupados.push(i);
        }
        render();
      }
    };

    grid.appendChild(div);
  }
}

render();

</script>

</body>
</html>

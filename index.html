<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Golpe de Suerte</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 FONDO GLOBAL (SOLO CAMBIA LA IMAGEN) */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;

  background: 
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url("fondo.jpg") center/cover no-repeat fixed;
}

/* 🖼️ PORTADA */
.portada {
  width: 100%;
  height: 260px;
  background: url("producto.jpg") center/cover no-repeat;
}

/* 🏷️ TITULO */
h1 {
  margin: 20px 0 10px;
  font-size: 30px;
  letter-spacing: 1px;
}

/* 📦 INFO */
.info-container {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 15px 25px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* 🎯 CONTADOR */
.estado {
  margin: 15px;
  font-size: 14px;
  color: #ccc;
}

/* 🔢 GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 20px;
  max-width: 520px;
  margin: auto;
}

.numero {
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.25s;
}

/* ✨ HOVER PREMIUM */
.numero:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255,215,0,0.6);
  border-color: gold;
}

/* 🔴 OCUPADO */
.ocupado {
  background: rgba(80,0,0,0.7);
  border: 1px solid red;
  cursor: not-allowed;
}

/* 💬 BOTON WHATSAPP */
.boton {
  display: inline-block;
  margin: 20px;
  padding: 15px 30px;
  background: linear-gradient(145deg, #ffd700, #ffb300);
  color: black;
  font-weight: bold;
  border-radius: 12px;
  text-decoration: none;
  font-size: 16px;
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
  transition: 0.3s;
}

.boton:hover {
  transform: scale(1.05);
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

</style>
</head>

<body>

<!-- 🖼️ PORTADA -->
<div class="portada"></div>

<h1>🎟️ Calentador de agua 110v</h1>

<div class="info-container">
  <div class="box">💰 RD$200</div>
  <div class="box">📅 20 Abril</div>
</div>

<div class="estado" id="contador"></div>

<!-- 🔢 NUMEROS -->
<div class="grid" id="grid"></div>

<!-- 💬 BOTON -->
<a class="boton" href="https://wa.me/18494501097" target="_blank">
  Comprar por WhatsApp
</a>

<script>

const grid = document.getElementById("grid");
const contador = document.getElementById("contador");

const total = 100;
const telefono = "18494501097";

// 🔐 ADMIN
const PASSWORD = "1097";
let modoAdmin = false;

document.addEventListener("keydown", () => {
  const pass = prompt("Clave admin:");
  if (pass === PASSWORD) {
    modoAdmin = true;
    alert("Modo admin activado");
  }
});

let ocupados = JSON.parse(localStorage.getItem("ocupados")) || [];

function actualizar() {
  contador.textContent = `Disponibles: ${total - ocupados.length} / ${total}`;
}

actualizar();

for (let i = 1; i <= total; i++) {

  const div = document.createElement("div");
  div.classList.add("numero");
  div.textContent = i;

  if (ocupados.includes(i)) {
    div.classList.add("ocupado");
  }

  div.onclick = () => {

    if (modoAdmin) {
      if (!ocupados.includes(i)) {
        ocupados.push(i);
        localStorage.setItem("ocupados", JSON.stringify(ocupados));
        div.classList.add("ocupado");
        actualizar();
      }
    } else {
      const mensaje = `Hola, quiero el número ${i} de la rifa`;
      window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);
    }

  };

  grid.appendChild(div);
}

</script>

</body>
</html>
